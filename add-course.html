<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Add New Course</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="courses.html">My Courses</a>
    <a href="add-course.html">Add Course</a>
    <a href="contact.html">Contact</a>
</nav>

<main>
    <section class="card">
        <form>
            <label>Course Name</label>
            <input type="text" placeholder="Enter course name" required>

            <label>Instructor</label>
            <input type="text" placeholder="Enter instructor name" required>

            <label>Credit Hours</label>
            <input type="number" min="1" required>

            <label>Notes</label>
            <textarea placeholder="Write notes..."></textarea>

            <button type="submit">Add Course</button>
        </form>
    </section>
</main>

<footer>
    <p>© 2026 Course Organizer</p>
</footer>

</body>
</html>
